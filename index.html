    .content {

      font-family: 'Brush Script MT', 'Lucida Handwriting', cursive;
      color: #a71b7b;
      text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.8);

    }

    #site-logo,
    #site-logo-right {
      width: 180px;
      max-height: 150px;
      object-fit: contain;
      margin: 0;
      display: block;
      border: none;
      background: transparent;
      box-shadow: none;
      position: absolute;
      top: 28px;
      z-index: 20;
    }

    #site-logo {

    }

    #site-logo-right {

    }

    .content {
      width: calc(100% - 36px);
      margin: 20px auto;
      padding: 40px 16px 20px;
      background: #ffffff;
      border: 1px solid #fff1fc;

    .squiggle {

    .link-button {

    }

      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .gallery-grid img {
      width: 100%;
      height: 250px;
      object-fit: contain;
      background: #fff;
      border-radius: 10px;
      border: 4px solid #ffeafa;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease;
      padding: 4px;
      box-sizing: border-box;
    }

    .gallery-grid img:hover {
      border-color: #ffccd7;
      transform: scale(1.03);
    }

    .lightbox img {
      max-width: 90%;
      max-height: 86%;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
      border: none;
    }
    .gallery-grid img:hover {
      transform: scale(1.04);
    }

    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 999;
    }

    .lightbox.hidden {
      display: none;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 86%;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
      border: 3px solid #fff;
    }

    .lightbox .close {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      font-size: 2.2rem;
      cursor: pointer;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
    }
  </style>
</head>

<body>
  
  <header></header>

  <div class="content">
    <div class="main-title-block">
      <img id="site-logo" src="Logos/IMG_6409.JPG" alt="Sweet Trio logo" />
      <h1>The Sweet Trio</h1>
      <p>
        Custom Cookie Cakes!<br>
        <span class="line-break"></span>
        Baking up joy for birthdays, milestones & all the sweet moments in between.<br>
        <span class="line-break"></span>
        Located in Elmore, OH.
      </p>
    </div>
    <img id="site-logo-right" src="Logos/IMG_6409.JPG" alt="Sweet Trio logo" />

    <div class="page-links" aria-label="In-page navigation links">
      <a href="gallery.html">Gallery</a>
      <a href="cake-options.html">Size/Pricing Options</a>
      <a href="orders.html">Orders</a>
    </div>

    <section id="gallery-slider" class="gallery-grid" aria-label="Featured gallery photos"></section>
  </div>

  <div id="lightbox" class="lightbox hidden" aria-hidden="true" role="dialog" aria-label="Image preview">
    <span class="close" role="button" aria-label="Close">&times;</span>
    <img id="lightbox-img" src="" alt="Expanded gallery image" />
  </div>

  <script>
    const toggle = document.getElementById('menu-toggle');
    const nav = document.getElementById('main-nav');

    if (toggle && nav) {
      toggle.addEventListener('click', () => {
        nav.classList.toggle('hidden');
      });
    }

    const galleryImages = [
      'Gallery/IMG_6332.JPG', 'Gallery/IMG_6333.JPG', 'Gallery/IMG_6334.JPG', 'Gallery/IMG_6335.JPG',
      'Gallery/IMG_6336.JPG', 'Gallery/IMG_6337.JPG', 'Gallery/IMG_6338.JPG', 'Gallery/IMG_6339.JPG',
      'Gallery/IMG_6340.JPG', 'Gallery/IMG_6341.JPG', 'Gallery/IMG_6342.JPG', 'Gallery/IMG_6343.JPG',
      'Gallery/IMG_6344.JPG', 'Gallery/IMG_6345.JPG', 'Gallery/IMG_6346.JPG', 'Gallery/IMG_6347.JPG',
      'Gallery/IMG_6348.JPG', 'Gallery/IMG_6349.JPG', 'Gallery/IMG_6350.JPG', 'Gallery/IMG_6351.JPG',
      'Gallery/IMG_6352.JPG', 'Gallery/IMG_6353.JPG', 'Gallery/IMG_6354.JPG', 'Gallery/IMG_6355.JPG',
      'Gallery/IMG_6356.JPG', 'Gallery/IMG_6357.JPG', 'Gallery/IMG_6358.JPG', 'Gallery/IMG_6359.JPG',
      'Gallery/IMG_6360.JPG', 'Gallery/IMG_6361.JPG', 'Gallery/IMG_6362.JPG', 'Gallery/IMG_6363.JPG',
      'Gallery/IMG_6364.JPG', 'Gallery/IMG_6365.JPG', 'Gallery/IMG_6366.JPG', 'Gallery/IMG_6367.JPG',
      'Gallery/IMG_6368.JPG', 'Gallery/IMG_6369.JPG', 'Gallery/IMG_6370.JPG', 'Gallery/IMG_6371.JPG',
      'Gallery/IMG_6372.JPG', 'Gallery/IMG_6373.JPG', 'Gallery/IMG_6374.JPG', 'Gallery/IMG_6375.JPG',
      'Gallery/IMG_6376.JPG', 'Gallery/IMG_6377.JPG', 'Gallery/IMG_6379.JPG', 'Gallery/IMG_6380.JPG',
      'Gallery/IMG_6381.JPG', 'Gallery/IMG_6382.JPG', 'Gallery/IMG_6383.JPG', 'Gallery/IMG_6384.JPG',
      'Gallery/IMG_6385.JPG', 'Gallery/IMG_6386.JPG', 'Gallery/IMG_6387.JPG', 'Gallery/IMG_6388.JPG',
      'Gallery/IMG_6389.JPG', 'Gallery/IMG_6390.JPG', 'Gallery/IMG_6391.JPG', 'Gallery/IMG_6392.JPG',
      'Gallery/IMG_6393.JPG', 'Gallery/IMG_6394.JPG', 'Gallery/IMG_6395.JPG', 'Gallery/IMG_6396.JPG',
      'Gallery/IMG_6397.JPG', 'Gallery/IMG_6398.JPG', 'Gallery/IMG_6399.JPG', 'Gallery/IMG_6400.JPG',
      'Gallery/IMG_6401.JPG', 'Gallery/IMG_6402.JPG', 'Gallery/IMG_6403.JPG', 'Gallery/IMG_6404.JPG',
      'Gallery/IMG_6405.JPG', 'Gallery/IMG_6406.JPG', 'Gallery/IMG_6407.JPG', 'Gallery/IMG_6408.JPG'
    ];

    const slider = document.getElementById('gallery-slider');

    function getRandomImages(count) {
      const copy = [...galleryImages];
      const selected = [];

      for (let i = 0; i < count; i++) {
        const randomIndex = Math.floor(Math.random() * copy.length);
        selected.push(copy.splice(randomIndex, 1)[0]);
      }

      return selected;
    }

    function renderGallery() {
      slider.style.opacity = '0';
      slider.style.transition = 'opacity 0.5s ease-in-out';

      setTimeout(() => {
        slider.innerHTML = '';
        // Show 2 images on mobile, 4 on desktop
        const isMobile = window.matchMedia('(max-width: 700px)').matches;
        const count = isMobile ? 2 : 4;
        const selected = getRandomImages(count);

        selected.forEach((src, index) => {
          const img = document.createElement('img');
          img.src = src;
          img.alt = `Cake gallery image ${index + 1}`;
          img.style.opacity = '0';
          img.style.transition = 'opacity 0.5s ease-in-out';
          img.addEventListener('click', () => showLightbox(img.src, img.alt));
          slider.appendChild(img);

          requestAnimationFrame(() => {
            img.style.opacity = '1';
          });
        });

        slider.style.opacity = '1';
      }, 500);
    }

    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightbox-img');
    const closeBtn = document.querySelector('.lightbox .close');

    function showLightbox(src, alt) {
      lightboxImage.src = src;
      lightboxImage.alt = alt;
      lightbox.classList.remove('hidden');
      lightbox.setAttribute('aria-hidden', 'false');
    }

    function hideLightbox() {
      lightbox.classList.add('hidden');
      lightbox.setAttribute('aria-hidden', 'true');
      lightboxImage.src = '';
    }

    closeBtn.addEventListener('click', hideLightbox);
    lightbox.addEventListener('click', (event) => {
      if (event.target === lightbox || event.target === lightboxImage) {
        hideLightbox();
      }
    });

    renderGallery();

    setInterval(renderGallery, 5000);
  </script>
</body>

</html>
